containers:
  - name: mysql
    image: mysql:8
    env:
      - name: MYSQL_ROOT_PASSWORD
        value: root
      - name: MYSQL_DATABASE
        value: auth_db
    ports:
      - containerPort: 3306
    volumeMounts:
      - name: mysql-storage
        mountPath: /var/lib/mysql

volumes:
  - name: mysql-storage
    persistentVolumeClaim:
      claimName: mysql-pvc